<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ParcelPilot 物流查询</title>
    <meta
      name="description"
      content="移动端优先的跨境物流查询页面，可对接自有后端代理和物流追踪 API。"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="app-header">
      <a class="brand" href="#" aria-label="ParcelPilot 首页">
        <span class="brand-mark" aria-hidden="true">
          <svg viewBox="0 0 32 32" role="img">
            <path d="M7 10.5 16 5l9 5.5v10.8l-9 5.7-9-5.7V10.5Z" />
            <path d="m7.7 10.8 8.3 5 8.3-5M16 15.8v10.4" />
          </svg>
        </span>
        <span class="brand-text">ParcelPilot</span>
      </a>

      <nav class="header-actions" aria-label="页面操作">
        <button class="icon-button" type="button" id="copySummaryBtn" title="复制摘要">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <rect x="9" y="9" width="10" height="10" rx="2" />
            <path d="M5 15V7a2 2 0 0 1 2-2h8" />
          </svg>
        </button>
        <button class="locale-button" type="button" title="语言">CN</button>
      </nav>
    </header>

    <main class="app-main">
      <section class="tracker-workspace" aria-label="物流查询">
        <section class="query-panel" aria-labelledby="queryTitle">
          <div class="panel-title-row">
            <div>
              <p class="eyebrow">Global Tracking</p>
              <h1 id="queryTitle">包裹追踪</h1>
            </div>
            <div class="quota-pill">
              <span id="numberCount">0</span><span>/40</span>
            </div>
          </div>

          <form id="trackingForm" class="tracking-form" novalidate>
            <div class="field-group">
              <label for="trackingNumbers">运单号</label>
              <textarea
                id="trackingNumbers"
                name="trackingNumbers"
                rows="7"
                spellcheck="false"
                autocomplete="off"
                placeholder="RJ556381428CN&#10;LN328306902US&#10;3861078222"
              ></textarea>
            </div>

            <div class="control-grid">
              <label class="select-field" for="carrierSelect">
                <span>承运商</span>
                <select id="carrierSelect" name="carrier">
                  <option value="">自动识别</option>
                  <option value="21051">USPS</option>
                  <option value="dhl-express">DHL Express</option>
                  <option value="fedex">FedEx</option>
                  <option value="ups">UPS</option>
                  <option value="china-post">China Post</option>
                  <option value="yunexpress">YunExpress</option>
                  <option value="sf-express">SF Express</option>
                  <option value="4px">4PX</option>
                </select>
              </label>

              <label class="select-field" for="localeSelect">
                <span>语言</span>
                <select id="localeSelect" name="locale">
                  <option value="zh-CN">简体中文</option>
                  <option value="en">English</option>
                  <option value="ja">日本語</option>
                  <option value="es">Español</option>
                </select>
              </label>
            </div>

            <div class="carrier-chips" aria-label="常用承运商">
              <button type="button" data-carrier="">自动</button>
              <button type="button" data-carrier="21051">USPS</button>
              <button type="button" data-carrier="dhl-express">DHL</button>
              <button type="button" data-carrier="fedex">FedEx</button>
              <button type="button" data-carrier="china-post">China Post</button>
            </div>

            <p class="form-message" id="formMessage" role="status" aria-live="polite"></p>

            <div class="form-actions">
              <button class="ghost-button" type="button" id="clearBtn">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M4 7h16M10 11v6M14 11v6M6 7l1 13h10l1-13M9 7V4h6v3" />
                </svg>
                <span>清空</span>
              </button>
              <button class="primary-button" type="submit" id="trackBtn">
                <span>查询</span>
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M5 12h14M13 6l6 6-6 6" />
                </svg>
              </button>
            </div>
          </form>
        </section>

        <aside class="status-panel" aria-label="物流概览">
          <div class="status-card compact">
            <span class="stat-label">今日查询</span>
            <strong id="todayCount">0</strong>
          </div>

          <div class="route-visual" aria-hidden="true">
            <span class="pin origin"></span>
            <span class="pin hub"></span>
            <span class="pin destination"></span>
            <span class="route-line"></span>
            <div class="parcel-cube">
              <svg viewBox="0 0 80 80">
                <path d="M18 24 40 12l22 12v28L40 66 18 52V24Z" />
                <path d="m18 24 22 13 22-13M40 37v29" />
                <path d="m29 18 22 13" />
              </svg>
            </div>
          </div>

          <div class="status-grid" id="summaryGrid">
            <div>
              <span>运输中</span>
              <strong data-summary="transit">0</strong>
            </div>
            <div>
              <span>已妥投</span>
              <strong data-summary="delivered">0</strong>
            </div>
            <div>
              <span>异常</span>
              <strong data-summary="exception">0</strong>
            </div>
            <div>
              <span>待查询</span>
              <strong data-summary="pending">0</strong>
            </div>
          </div>
        </aside>
      </section>

      <section class="results-section" aria-label="查询结果">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Tracking Results</p>
            <h2>查询结果</h2>
          </div>
          <div class="batch-actions">
            <button class="ghost-button small" type="button" id="expandAllBtn">展开</button>
            <button class="ghost-button small" type="button" id="collapseAllBtn">收起</button>
          </div>
        </div>

        <div id="emptyState" class="empty-state">
          <div class="empty-illustration" aria-hidden="true">
            <svg viewBox="0 0 160 112">
              <path d="M23 78h114" />
              <path d="M47 42 80 24l33 18v38L80 99 47 80V42Z" />
              <path d="m47 42 33 19 33-19M80 61v38" />
              <path d="M34 33h24M28 49h18M113 31h20M118 48h15" />
            </svg>
          </div>
          <h3>输入运单号后开始查询</h3>
        </div>

        <div id="resultsList" class="results-list"></div>
      </section>
    </main>

    <template id="shipmentTemplate">
      <article class="shipment-card">
        <header class="shipment-header">
          <div>
            <div class="shipment-kicker">
              <span class="carrier-name"></span>
              <span class="status-pill"></span>
            </div>
            <h3 class="tracking-number"></h3>
          </div>
          <button class="icon-button copy-button" type="button" title="复制结果">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="9" y="9" width="10" height="10" rx="2" />
              <path d="M5 15V7a2 2 0 0 1 2-2h8" />
            </svg>
          </button>
        </header>

        <div class="route-summary">
          <div>
            <span>发件地</span>
            <strong class="origin"></strong>
          </div>
          <div class="route-progress" aria-hidden="true"><span></span></div>
          <div>
            <span>目的地</span>
            <strong class="destination"></strong>
          </div>
        </div>

        <dl class="shipment-meta">
          <div>
            <dt>更新时间</dt>
            <dd class="updated-at"></dd>
          </div>
          <div>
            <dt>预计送达</dt>
            <dd class="eta"></dd>
          </div>
          <div>
            <dt>运输天数</dt>
            <dd class="days"></dd>
          </div>
        </dl>

        <div class="timeline-wrap">
          <ol class="timeline"></ol>
        </div>

        <button class="toggle-details" type="button">
          <span>收起轨迹</span>
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="m6 9 6 6 6-6" />
          </svg>
        </button>
      </article>
    </template>

    <script src="app.js" defer></script>
  </body>
</html>
